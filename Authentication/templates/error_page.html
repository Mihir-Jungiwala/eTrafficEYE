<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>System Alert</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(180deg,#e3f2fd,#ffffff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.mobile-app{
width:100%;
max-width:390px;
padding:18px;
text-align:center;
}

.alert-box{
width:90px;
height:90px;
background:linear-gradient(135deg,#0d6efd,#3f8cff);
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
color:white;
font-size:36px;
margin-bottom:15px;
box-shadow:0 10px 25px rgba(13,110,253,0.35);
animation:scan 2s infinite;
}

@keyframes scan{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.card{
background:white;
padding:22px;
border-radius:22px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.code{
font-size:36px;
font-weight:700;
color:#0d6efd;
}

.title{
font-size:18px;
font-weight:600;
margin-top:6px;
}

.sub{
font-size:13px;
color:#666;
margin-top:10px;
line-height:1.5;
}

.btn{
margin-top:18px;
height:44px;
border-radius:12px;
background:#0d6efd;
color:white;
border:none;
width:100%;
font-size:14px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(13,110,253,0.35);
}

.scan-line{
position:absolute;
top:0;
left:0;
width:100%;
height:3px;
background:#0d6efd;
animation:moveLine 2.5s linear infinite;
}

@keyframes moveLine{
0%{top:0;}
100%{top:100%;}
}

</style>

</head>

<body>

<div class="mobile-app">

<div class="alert-box">
<i class="fa-solid fa-camera"></i>
</div>

<div class="card">

<div class="code">404</div>

<div class="title">Page Not Available</div>

<div class="sub">
The requested page could not be found or is no longer accessible. 
Please verify the URL or return to the previous screen.
</div>

<button class="btn" onclick="goBack()">
Go Back
</button>

</div>

</div>

<script>

function goBack(){
if(document.referrer){
window.location.href = document.referrer;
}else{
window.history.back();
}
}

</script>

</body>
</html>
