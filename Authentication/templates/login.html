<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eTrafficEye Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
background: linear-gradient(180deg,#e3f2fd,#ffffff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.mobile-app{
width:100%;
max-width:390px;
height:100vh;
padding:25px 20px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* Header */
.app-header{
text-align:center;
margin-bottom:30px;
}

.app-icon{
width:65px;
height:65px;
background:#0d6efd;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
color:white;
font-size:26px;
margin-bottom:10px;
box-shadow:0 6px 15px rgba(13,110,253,0.25);
}

.app-title{
font-size:20px;
font-weight:600;
color:#0d6efd;
}

.app-subtitle{
font-size:13px;
color:#6c757d;
}

/* Card */
.login-card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

/* Form */
.form-label{
font-size:13px;
font-weight:500;
}

.form-control{
height:42px;
border-radius:10px;
font-size:14px;
}

/* 🔹 INPUT WITH EYE */
.input-wrapper{
position:relative;
}

.input-wrapper input{
padding-right:40px;
}

.input-wrapper i{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#6c757d;
}

/* Button */
.btn-login{
height:45px;
border-radius:12px;
background:#0d6efd;
color:white;
font-weight:500;
border:none;
}

/* FORCE SAME STYLE IN ALL STATES */
.btn-login,
.btn-login:hover,
.btn-login:focus,
.btn-login:active{
background:#0d6efd !important;
color:white !important;
border:none !important;
outline:none !important;
box-shadow:none !important;
}

.btn-login:hover{
background:#0b5ed7;
}

/* Footer */
.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:gray;
}

/* REMOVE UNDERLINE */
a, a:hover, a:focus{
text-decoration:none !important;
}

</style>

</head>

<body>

<div class="mobile-app">

<!-- Header -->

<div class="app-header">
<div class="app-icon">
<i class="fa-solid fa-traffic-light"></i>
</div>
<div class="app-title">eTrafficEye</div>
<div class="app-subtitle">Traffic Reporting System</div>
</div>

<!-- Login Card -->

<div class="login-card">

<form method="POST">
{% csrf_token %}

<!-- 🔹 MESSAGE BLOCK -->

{% if messages %}
{% for message in messages %}

<div style="color:red; text-align:center; margin-bottom:10px;">
{{ message }}
</div>
{% endfor %}
{% endif %}

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter username" required>
</div>

<!-- 🔹 PASSWORD WITH EYE -->

<div class="mb-3">
<label class="form-label">Password</label>

<div class="input-wrapper">
<input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
<i class="fa fa-eye" onclick="togglePassword('password', this)"></i>
</div>

</div>

<!-- 🔹 FORGOT PASSWORD -->

<div style="text-align:right; font-size:13px;">
<a href="{% url 'Forgot_Password' %}">Forgot Password?</a>
</div>

<div class="d-grid mt-3">
<button type="submit" class="btn btn-login">
Login
</button>
</div>

<!-- 🔹 SIGN UP LINK -->

<div style="text-align:center; margin-top:10px; font-size:13px;">
Don't have an account?
<a href="{% url 'Civilian_Profile_Registration' %}">Sign Up</a>
</div>

</form>

</div>

<div class="footer">
Secure & Smart Traffic Monitoring
</div>

</div>

<!-- 🔹 JS -->

<script>
function togglePassword(id, icon){
    const input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    }else{
        input.type = "password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}
</script>

</body>
</html>
